<button id="assignment-type-add-popover-button" type="button" class="btn btn-secondary"><i class="iconoir-plus"></i></button>

<div id="assignment-type-add-popover-form" class="d-none">
    <form class="needs-validation" novalidate>
        <div class="input-group mb-2">
            <span class="input-group-text"><i class="iconoir-label"></i></span>
            <input type="text" class="form-control form-control-lg " id="assignment-type-name" required placeholder="Assignment Type" aria-label="Assignment Name" name="assignment_type_name">
        </div>
        <div class="input-group mb-2">
            <span class="input-group-text"><i class="iconoir-book-stack"></i></span>
            <select class="form-select form-select-lg " id="assignment-base-type" required aria-label="Base Type" name="assignment_base_type">
                <option selected disabled value="">Base Type</option>
                <option value="Homework">Homework</option>
                <option value="Quiz">Quiz</option>
                <option value="Essay">Essay</option>
            </select>
        </div>
        <div class="form-check pb-2 mb-2 border-bottom">
            <input class="form-check-input" type="checkbox" value="" id="assignment-type-has-set-time" name="assignment_type_has_set_time">
            <label class="form-check-label" for="assignment-type-has-set-time">Has set time <i class="iconoir-info-circle fs-5" data-bs-toggle="tooltip" data-bs-title="Allows for the assignment to have a set time instead of being estimated"></i></label>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100 d-block">Add</button>
    </form>
</div>
